<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowBeat</title>
    <script>
      // If this page was opened as a Spotify auth popup, send the code
      // back to the parent window and close immediately.
      // This runs before React boots, so it's instant.
      (function () {
        if (window.opener) {
          var params = new URLSearchParams(window.location.search);
          var code = params.get('code');
          var error = params.get('error');
          if (code) {
            window.opener.postMessage({ spotify_code: code }, window.location.origin);
            window.close();
          } else if (error) {
            window.opener.postMessage({ spotify_error: error }, window.location.origin);
            window.close();
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
